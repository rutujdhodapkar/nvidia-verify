name: Mailjet Email Automation

on:
  schedule:
    - cron: '30 18 * * *'
      timezone: 'Asia/Kolkata'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Email mode to run'
        required: true
        default: 'combined'
        type: choice
        options:
          - all
          - combined
          - analyze
          - logs
      dry-run:
        description: 'Dry run (preview only, no emails sent)'
        required: false
        default: false
        type: boolean
      sandbox:
        description: 'Sandbox email (redirect all sends to this address)'
        required: false
        default: ''
        type: string
  repository_dispatch:
    types:
      - trigger-mailjet-welcome
      - trigger-mailjet-offer
      - trigger-mailjet-payment
      - trigger-mailjet-completion

jobs:
  send-emails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install

      - name: Determine email mode
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode || 'combined' }}"
          if [[ "${{ github.event.action }}" == trigger-mailjet-* ]]; then MODE="combined"; fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT

      - id: args
        run: |
          ARGS="${{ steps.mode.outputs.mode }}"
          if [[ "${{ github.event.inputs.dry-run }}" == "true" ]]; then ARGS="$ARGS --dry-run"; fi
          echo "args=$ARGS" >> $GITHUB_OUTPUT
      - id: envs
        run: |
          SANDBOX="${{ github.event.inputs.sandbox }}"
          echo "sandbox=$SANDBOX" >> $GITHUB_OUTPUT
      - run: node scripts/mailjet-automation.js ${{ steps.args.outputs.args }}
        env:
          NODE_ENV: production
          SANDBOX_EMAIL: ${{ steps.envs.outputs.sandbox }}
          COSMOS_DB_CONNECTION_STRING: ${{ secrets.COSMOS_DB_CONNECTION_STRING }}
          MAILJET_API_KEY: ${{ secrets.MAILJET_API_KEY }}
          MAILJET_SECRET_KEY: ${{ secrets.MAILJET_SECRET_KEY }}
          FIREBASE_LOGS_URL: ${{ secrets.FIREBASE_LOGS_URL || 'https://laptop-privacy-default-rtdb.firebaseio.com' }}
          BLOCKED_EMAILS: ${{ secrets.BLOCKED_EMAILS }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_MODEL: ${{ secrets.NVIDIA_MODEL }}
