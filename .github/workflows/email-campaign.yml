name: Email Campaign

on:
  schedule:
    - cron: '30 4 * * *'
      timezone: 'Asia/Kolkata'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-email-campaign]

jobs:
  send-emails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: node scripts/send-bulk.js
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
