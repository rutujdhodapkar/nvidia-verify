name: DEV/CRAFT LinkedIn Agent

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run agent
        run: node scripts/agent.js
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_MODEL: ${{ secrets.NVIDIA_MODEL }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_PAGE_ID: ${{ secrets.LINKEDIN_PAGE_ID }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          ZAPIER_TOKEN: ${{ secrets.ZAPIER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

