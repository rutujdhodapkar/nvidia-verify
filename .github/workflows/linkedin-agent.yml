name: DEV/CRAFT LinkedIn Agent

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run agent
        run: node scripts/agent.js
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_MODEL: ${{ secrets.NVIDIA_MODEL }}
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}

      - name: Commit state
        run: |
          git config user.name "devcraft-agent"
          git config user.email "agent@devcraft.fennark.xyz"
          git pull --rebase
          git add data/state.json data/screenshots/
          git diff --cached --quiet || git commit -m "chore: agent run state [skip ci]"
          git push
